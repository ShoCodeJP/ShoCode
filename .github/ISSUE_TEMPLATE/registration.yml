name: "🎫 ShoCode Registration / ShoCode 参加登録"
description: "Register to attend ShoCode / ShoCode への参加登録"
title: "Registration: @{github_username} / 参加登録: @{github_username}"
labels: ["registration"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to ShoCode! / ShoCode へようこそ！

        Fill out this form to register for ShoCode. Your information will be used
        to create your profile page in the repository.

        このフォームに記入して ShoCode に参加登録してください。この情報をもとに
        リポジトリにプロフィールページが作成されます。

        ---

  - type: input
    id: display_name
    attributes:
      label: "Display Name / 表示名"
      description: >
        The name you'd like on your badge and profile. Write it however you prefer
        (given name first, family name first, nickname — all OK).
        バッジやプロフィールに表示する名前。お好きな形式でどうぞ
        （名前が先でも姓が先でもニックネームでもOK）。
      placeholder: "e.g., Tanaka Yuki / 田中 ゆき"
    validations:
      required: true

  - type: input
    id: github_username
    attributes:
      label: "GitHub Username / GitHub ユーザー名"
      description: >
        Your GitHub username (without the @).
        GitHub ユーザー名（@ なし）。
      placeholder: "e.g., yukitanaka"
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: "Contact / 連絡先"
      description: >
        At least one way to reach you — email, LINE, Messenger, etc.
        少なくとも1つの連絡方法 — メール、LINE、Messenger など。
      placeholder: "e.g., yuki@example.com"
    validations:
      required: true

  - type: input
    id: social
    attributes:
      label: "Social Media / ソーシャルメディア"
      description: >
        Links to your profiles — Twitter/X, LinkedIn, Bluesky, etc. (optional)
        Twitter/X、LinkedIn、Bluesky などのリンク（任意）。
      placeholder: "e.g., https://twitter.com/yukitanaka"
    validations:
      required: false

  - type: textarea
    id: introduction
    attributes:
      label: "Self-Introduction / 自己紹介"
      description: >
        Introduce yourself briefly. What do you build? What are you passionate about?
        What's your relationship with agentic coding or AI-assisted development?
        簡単に自己紹介してください。何を作っていますか？何に情熱を持っていますか？
        エージェンティック・コーディングや AI アシスト開発との関わりは？
      placeholder: |
        I'm a backend engineer working on autonomous code review agents...
        バックエンドエンジニアで、自律的なコードレビューエージェントに取り組んでいます…
    validations:
      required: true

  - type: textarea
    id: what_youll_bring
    attributes:
      label: "What You'll Bring to ShoCode / ShoCode に持ち込むもの"
      description: >
        What do you want to present, build, or demo? Focus on agentic coding,
        AI-assisted development, or related technical topics.
        プレゼン、ビルド、またはデモしたい内容は？エージェンティック・コーディングや
        AI アシスト開発などの技術トピックにフォーカスしてください。
      placeholder: |
        I want to demo a multi-agent code review pipeline I've been building...
        マルチエージェントのコードレビューパイプラインをデモしたいです…
    validations:
      required: true

  - type: textarea
    id: project_links
    attributes:
      label: "Code & Project Links / コード・プロジェクトリンク"
      description: >
        Share links to repos, gists, blogs, or prior work (optional).
        リポジトリ、Gist、ブログ、過去の成果物へのリンク（任意）。
      placeholder: |
        - https://github.com/username/project
        - https://example.com/blog-post
    validations:
      required: false

  - type: dropdown
    id: preferred_role
    attributes:
      label: "Preferred Role / 希望する役割"
      description: >
        How would you like to participate?
        どのように参加したいですか？
      options:
        - "Presenter — give a talk / プレゼンター — トークを行う"
        - "Hacker — build & demo at the hackathon / ハッカー — ハッカソンで作ってデモ"
        - "Both — present and hack / 両方 — プレゼンもハックも"
        - "Attendee — come, learn, and connect / 参加者 — 来場し、学び、つながる"
    validations:
      required: true

  - type: dropdown
    id: preferred_language
    attributes:
      label: "Preferred Language / 希望する言語"
      description: >
        Which language do you prefer for communications and your profile page?
        コミュニケーションやプロフィールページの希望言語は？
      options:
        - "English"
        - "日本語"
        - "Both OK / どちらでも"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Accessibility & Needs / アクセシビリティとご要望

        The following questions are optional and help us make the event
        welcoming for everyone.

        以下の質問は任意です。すべての方にとって居心地の良いイベントにするために
        ご協力ください。

  - type: textarea
    id: dietary_needs
    attributes:
      label: "Dietary Needs / 食事の制限やアレルギー"
      description: >
        Allergies, dietary restrictions, or preferences (optional).
        アレルギー、食事制限、希望など（任意）。
      placeholder: |
        e.g., vegetarian, nut allergy / ベジタリアン、ナッツアレルギー
    validations:
      required: false

  - type: textarea
    id: accessibility_needs
    attributes:
      label: "Accessibility Needs / アクセシビリティに関するご要望"
      description: >
        Wheelchair access, hearing/vision assistance, quiet space, or anything
        else we should know (optional).
        車椅子、聴覚・視覚サポート、静かな空間など、お知らせいただきたいこと（任意）。
      placeholder: |
        e.g., wheelchair access needed / 車椅子でのアクセスが必要
    validations:
      required: false

  - type: dropdown
    id: childcare
    attributes:
      label: "Childcare Interest / 託児所の利用に関心がありますか"
      description: >
        Would you attend if childcare were available? This helps us gauge interest.
        託児所があれば参加しやすいですか？需要を把握するための質問です。
      options:
        - "Not needed / 不要"
        - "Yes, I would use childcare / はい、利用したい"
        - "Maybe / 検討中"
    validations:
      required: false

  - type: input
    id: how_heard
    attributes:
      label: "How did you hear about ShoCode? / ShoCode をどこで知りましたか？"
      description: >
        Helps us understand how the community is growing (optional).
        コミュニティの成長を理解するためにお聞きしています（任意）。
      placeholder: "e.g., Twitter, friend, GitHub Explore / Twitter、友人、GitHub Explore"
    validations:
      required: false

  - type: checkboxes
    id: code_of_conduct
    attributes:
      label: "Code of Conduct / 行動規範"
      description: >
        Please confirm you have read and agree to our Code of Conduct.
        行動規範を読み、同意することをご確認ください。
      options:
        - label: >
            I have read and agree to the [Code of Conduct](../../CODE_OF_CONDUCT.md).
            / [行動規範](../../CODE_OF_CONDUCT.md)を読み、同意します。
          required: true

  - type: checkboxes
    id: license_agreement
    attributes:
      label: "License / ライセンス"
      description: >
        Your profile page will be published under the repository's Creative Commons license.
        プロフィールページはリポジトリの Creative Commons ライセンスの下で公開されます。
      options:
        - label: >
            I understand my profile will be published under the [Creative Commons LICENSE](../../LICENSE).
            / プロフィールが [Creative Commons ライセンス](../../LICENSE)の下で公開されることを理解しています。
          required: true
